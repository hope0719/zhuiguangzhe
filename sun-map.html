// ==================== WEATHER API ====================

async function fetchWeather(lat,lon){
  const key=`${lat.toFixed(2)},${lon.toFixed(2)}`;
  if(weatherCache[key]) return weatherCache[key];
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,cloud_cover,apparent_temperature,uv_index&daily=weather_code,temperature_2m_max,temperature_2m_min,sunshine_duration,precipitation_sum,uv_index_max&timezone=auto&forecast_days=7`;
  try{
    const res=await fetch(url);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    weatherCache[key]=data;
    return data;
  }catch(e){
    console.warn(`Weather fetch failed for ${key}:`,e);
    return null;
  }
}

async function batchFetchWeather(items,progressCb){
  const batchSize=10;
  const results=[];
  for(let i=0;i<items.length;i+=batchSize){
    const batch=items.slice(i,i+batchSize);
    const settled=await Promise.allSettled(batch.map(it=>fetchWeather(it.lat,it.lon)));
    settled.forEach((s,idx)=>{
      results.push({item:batch[idx],data:s.status==='fulfilled'?s.value:null});
    });
    if(progressCb) progressCb(Math.min(i+batchSize,items.length),items.length);
  }
  return results;
}

function calcSunshineScore(data){
  if(!data||!data.daily) return 0;
  const codes=data.daily.weather_code||[];
  let sunny=0;
  codes.forEach(c=>{if(c!==undefined){const w=WMO[c];if(w&&(w.g==='sunny'))sunny++;}});
  return Math.round(sunny/7*100);
}

function getWMO(code){return WMO[code]||{d:'未知',i:'❓',g:'cloudy'};}

}

    selTo.add(new Option(c.name,c.name));
  });

  // Show detail placeholder
  document.getElementById('detail-card').classList.add('show');

  // Load GeoJSON + weather in parallel
  const loadingEl=document.getElementById('map-loading');
  const progressEl=document.getElementById('loading-progress');

  const [geoRes]=await Promise.all([
    fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json').then(r=>r.json()),
    loadAllWeather(progressEl)
  ]);

  echarts.registerMap('china',geoRes);
  loadingEl.classList.add('hidden');
  initMap();
}

async function loadAllWeather(progressEl){
  const items=Object.entries(PROVINCES).map(([name,v])=>({name,capital:v.capital,lat:v.lat,lon:v.lon}));
  let done=0;
  await batchFetchWeather(items,(d,t)=>{
    done=d;
    if(progressEl) progressEl.textContent=`天气数据 ${d}/${t}`;
  });
  // Update map data after all weather loaded
  if(mapChart) updateMapData();
}

// ==================== MAP ====================

function getMapData(){
  const data=[];
  Object.entries(PROVINCES).forEach(([name,v])=>{
    const key=`${v.lat.toFixed(2)},${v.lon.toFixed(2)}`;
    const wd=weatherCache[key];
    const score=calcSunshineScore(wd);
    data.push({name,value:score,capital:v.capital,weatherData:wd});
  });
  return data;
}

function initMap(){
  const container=document.getElementById('map-container');
  mapChart=echarts.init(container,null,{renderer:'canvas'});
  const mapData=getMapData();

  const option=buildOption(mapData);
  mapChart.setOption(option);

  mapChart.on('click',function(params){
    if(params.componentType==='series'&&params.seriesType==='map'){
      showProvinceDetail(params.name);
    }
  });

  window.addEventListener('resize',()=>{mapChart&&mapChart.resize();});
}

function buildOption(mapData,routeLines,routeScatter){
  const series=[
    {
      name:'阳光指数',
      type:'map',
      map:'china',
      roam:true,
      aspectScale:0.78,
      scaleLimit:{min:0.8,max:6},
      label:{
        show:true,
        fontSize:10,
        color:'#8B7D6B',
        formatter:function(p){
          // Shorten long names
          return p.name.replace(/(省|市|自治区|壮族|维吾尔|回族|特别行政区)/g,'');
        }
      },
      itemStyle:{
        areaColor:'#FFF8E7',
        borderColor:'#F0E4D4',
        borderWidth:1
      },
      emphasis:{
        label:{show:true,color:'#3D2C2C',fontSize:12,fontWeight:'bold'},
        itemStyle:{areaColor:'#FDE68A',borderColor:'#E8923F',borderWidth:2,shadowColor:'rgba(232,146,63,0.3)',shadowBlur:10}
      },
      data:mapData,
      select:{label:{show:true},itemStyle:{areaColor:'#FDE68A'}},
      selectedMode:false
    }
  ];

  if(routeLines){
    series.push(routeLines);
  }
  if(routeScatter){
    series.push(routeScatter);
  }

  return {
    backgroundColor:'transparent',
    tooltip:{
      trigger:'item',
      backgroundColor:'rgba(255,253,248,0.96)',
      borderColor:'#F0E4D4',
      borderWidth:1,
      textStyle:{color:'#3D2C2C',fontFamily:"'Lora','PingFang SC','Noto Sans CJK SC',sans-serif",fontSize:13},
      formatter:function(p){
        if(p.seriesType==='map'){
          const mi=mapData.find(d=>d.name===p.name);
          if(!mi||!mi.weatherData)return `<b>${p.name}</b><br/>天气数据加载中...`;
          const cur=mi.weatherData.current||{};
          const wc=getWMO(cur.weather_code);
          const score=mi.value;
          const daily=mi.weatherData.daily||{};
          const codes=daily.weather_code||[];
          let sunnyCount=0;
          codes.forEach(c=>{if(WMO[c]&&WMO[c].g==='sunny')sunnyCount++;});
          const temp=cur.temperature_2m!==undefined?cur.temperature_2m+'°C':'--';
          const uv=cur.uv_index!==undefined?cur.uv_index:'--';
          return `<b style="font-size:14px">${p.name}</b><br/>`
            +`<span style="color:#A0897A">省会: ${mi.capital}</span><br/>`
            +`${wc.i} ${wc.d}  ${temp}<br/>`
            +`UV指数: ${uv}  |  阳光评分: <b style="color:#E8923F">${score}</b><br/>`
            +`<span style="color:#A0897A">未来7天晴天: ${sunnyCount}天</span>`;
        }
        if(p.seriesType==='scatter'&&p.data){
          const d=p.data;
          return `<b>${d.city}</b><br/>${d.weather||''}<br/>${d.temp||''}`;
        }
        return '';
      }
    },
    visualMap:{
      type:'continuous',
      min:0,
      max:100,
      left:20,
      bottom:20,
      text:['阳光充沛','阴雨'],
      textStyle:{color:'#A0897A',fontSize:11,fontFamily:"'PingFang SC',sans-serif"},
      inRange:{
        color:['#FFF8E7','#FFF1CC','#FDE68A','#F7C946','#F5A65B','#E8923F']
      },
      itemWidth:16,
      itemHeight:120,
      calculable:true,
      handleStyle:{color:'#E8923F',borderColor:'#E8923F'}
    },
    series:series
  };
}

function updateMapData(){
  if(!mapChart)return;
  const mapData=getMapData();
  const option=mapChart.getOption();
  // Keep route series if any
  const existingSeries=option?option.series:[];
  const routeSeries=[];
  existingSeries.forEach(s=>{
    if(s.type==='lines'||s.type==='scatter') routeSeries.push(s);
  });

  const newOption=buildOption(mapData);
  // Append route series
  routeSeries.forEach(s=>newOption.series.push(s));
  mapChart.setOption(newOption,true);
}

// ==================== PROVINCE DETAIL ====================

function showProvinceDetail(provinceName){
  const card=document.getElementById('detail-card');
  const placeholder=document.getElementById('detail-placeholder');
  const content=document.getElementById('detail-content');
  const prov=PROVINCES[provinceName];
  if(!prov)return;

  const key=`${prov.lat.toFixed(2)},${prov.lon.toFixed(2)}`;
  const wd=weatherCache[key];

  card.classList.add('show');

  if(!wd){
    placeholder.style.display='block';
    placeholder.innerHTML=`<div class="ph-icon">⏳</div><div>正在加载 ${prov.capital} 的天气数据...</div>`;
    content.style.display='none';
    // Try fetching
    fetchWeather(prov.lat,prov.lon).then(d=>{
      if(d){
        weatherCache[key]=d;
        showProvinceDetail(provinceName);
      }
    });
    return;
  }

  placeholder.style.display='none';
  content.style.display='block';

  const cur=wd.current||{};
  const daily=wd.daily||{};
  const wc=getWMO(cur.weather_code);
  const score=calcSunshineScore(wd);
  const uv=cur.uv_index!==undefined?cur.uv_index:'--';
  const uvLv=uvLabel(uv);
  const temp=cur.temperature_2m!==undefined?Math.round(cur.temperature_2m):'--';
  const feels=cur.apparent_temperature!==undefined?Math.round(cur.apparent_temperature):'--';
  const wind=cur.wind_speed_10m!==undefined?Math.round(cur.wind_speed_10m):'--';
  const humidity=cur.relative_humidity_2m!==undefined?Math.round(cur.relative_humidity_2m):'--';
  const cloud=cur.cloud_cover!==undefined?Math.round(cur.cloud_cover):'--';

  const scoreClass=score>=60?'score-high':score>=30?'score-mid':'score-low';
  const scoreLabel=score>=70?'阳光充沛':score>=40?'时有阳光':'多阴雨';

  // Build 7-day forecast
  const dates=daily.time||[];
  const codes=daily.weather_code||[];
  const tMax=daily.temperature_2m_max||[];
  const tMin=daily.temperature_2m_min||[];
  const sunDur=daily.sunshine_duration||[];
  const weekdays=['周日','周一','周二','周三','周四','周五','周六'];

  let forecastHTML='';
  dates.forEach((dt,i)=>{
    const d=new Date(dt);
    const wmo=getWMO(codes[i]);
    const maxT=tMax[i]!==undefined?Math.round(tMax[i]):'--';
    const minT=tMin[i]!==undefined?Math.round(tMin[i]):'--';
    const sd=sunDur[i]!==undefined?(sunDur[i]/3600).toFixed(1)+'h':'--';
    const wd=weekdays[d.getDay()];
    const isToday=i===0?'今天':(d.getMonth()+1)+'/'+d.getDate()+' '+wd;
    forecastHTML+=`<div class="fc-day">
      <div class="fc-date">${isToday}</div>
      <div class="fc-icon">${wmo.i}</div>
      <div class="fc-temps">${maxT}° <span class="t-min">/ ${minT}°</span></div>
      <div class="fc-sun">☀️ ${sd}</div>
    </div>`;
  });

  content.innerHTML=`
    <div class="detail-header">
      <div><span class="detail-city">${prov.capital}</span><span class="detail-province">${provinceName}</span></div>
      <span class="sunshine-score-badge ${scoreClass}">☀️ ${score}分 ${scoreLabel}</span>
    </div>
    <div class="detail-weather-main">
      <div class="detail-icon">${wc.i}</div>
      <div>
        <div class="detail-temp">${temp}<span class="unit">°C</span></div>
        <div class="detail-desc">${wc.d} · 体感 ${feels}°C</div>
      </div>
    </div>
    <div class="detail-meta">
      <div class="detail-meta-item">💨 风速 <span class="val">${wind} km/h</span></div>
      <div class="detail-meta-item">💧 湿度 <span class="val">${humidity}%</span></div>
      <div class="detail-meta-item">☁️ 云量 <span class="val">${cloud}%</span></div>
      <div class="detail-meta-item">☀️ UV <span class="val">${uv} ${uvLv}</span></div>
    </div>
    <div class="forecast-strip">${forecastHTML}</div>
  `;

  // Smooth scroll to detail
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ==================== ROUTE PLANNING ====================

function dist(a,b){
  const R=6371;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLon=(b.lon-a.lon)*Math.PI/180;
  const x=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function findIntermediates(from,to,maxStops){
  const candidates=CITIES.filter(c=>c.name!==from.name&&c.name!==to.name);
  const totalDist=dist(from,to);
  const step=totalDist/(maxStops+1);
  const selected=[];
  const used=new Set([from.name,to.name]);

  for(let i=1;i<=maxStops;i++){
    const targetDist=step*i;
    let best=null;
    let bestDiff=Infinity;
    candidates.forEach(c=>{
      if(used.has(c.name))return;
      const dFrom=dist(from,c);
      const dTotal=dist(from,to);
      // Prefer cities roughly along the path
      const ratio=dFrom/Math.max(dTotal,1);
      const expectedRatio=i/(maxStops+1);
      const diff=Math.abs(ratio-expectedRatio);
      // Also factor in actual proximity to ideal point
      if(diff<bestDiff){
        bestDiff=diff;
        best=c;
      }
    });
    if(best&&bestDiff<0.35){
      selected.push(best);
      used.add(best.name);
    }
  }

  return selected;
}

function getWeatherGroup(data){
  if(!data||!data.daily)return 'cloudy';
  const codes=data.daily.weather_code||[];
  let sunny=0,rainy=0;
  codes.forEach(c=>{
    const w=WMO[c];
    if(!w)return;
    if(w.g==='sunny')sunny++;
    else if(w.g==='rainy'||w.g==='storm')rainy++;
  });
  if(sunny>=4)return 'sunny';
  if(rainy>=4)return 'rainy';
  if(sunny>=2)return 'cloudy';
  if(rainy>=2)return 'rainy';
  return 'cloudy';
}

async function drawRoute(){
  const fromName=document.getElementById('route-from').value;
  const toName=document.getElementById('route-to').value;
  if(!fromName||!toName){alert('请选择出发城市和目的地');return;}
  if(fromName===toName){alert('出发城市和目的地不能相同');return;}

  const btn=document.getElementById('btn-draw-route');
  btn.disabled=true;
  btn.textContent='🗺️ 规划中...';

  const fromCity=CITIES.find(c=>c.name===fromName);
  const toCity=CITIES.find(c=>c.name===toName);
  if(!fromCity||!toCity){btn.disabled=false;btn.textContent='🗺️ 绘制追光路线';return;}

  // Find intermediates
  const d=dist(fromCity,toCity);
  let maxStops=3;
  if(d>2500)maxStops=5;
  else if(d>1500)maxStops=4;
  else if(d>800)maxStops=3;
  else if(d>400)maxStops=2;
  else maxStops=1;

  const intermediates=findIntermediates(fromCity,toCity,maxStops);
  const route=[fromCity,...intermediates,toCity];

  // Fetch weather for all route cities
  const toFetch=route.map(c=>({name:c.name,lat:c.lat,lon:c.lon})).filter(c=>!weatherCache[`${c.lat.toFixed(2)},${c.lon.toFixed(2)}`]);
  if(toFetch.length>0) await batchFetchWeather(toFetch);

  // Sort intermediates by order along route (by distance from start)
  const startDist=route.map(c=>dist(fromCity,c));

  // Build coords for lines
  const coords=route.map(c=>[c.lon,c.lat]);

  // Build scatter data
  const scatterData=route.map(c=>{
    const key=`${c.lat.toFixed(2)},${c.lon.toFixed(2)}`;
    const wd=weatherCache[key];
    const group=getWeatherGroup(wd);
    const cur=wd?wd.current:{};
    const wc=getWMO(cur.weather_code);
    const temp=cur.temperature_2m!==undefined?Math.round(cur.temperature_2m)+'°C':'--';
    const label=group==='sunny'?'☀️':group==='rainy'?'🌧️':'⛅';
    const symbolSize=group==='sunny'?18:group==='rainy'?10:14;
    const itemColor=group==='sunny'?'#F7C946':group==='rainy'?'#A0897A':'#C0C0C0';
    return{
      name:c.name,
      value:[c.lon,c.lat],
      city:c.name,
      weather:wc.i+' '+wc.d,
      temp:temp,
      group:group,
      label:label,
      symbolSize:symbolSize,
      itemStyle:{color:itemColor,borderColor:'#fff',borderWidth:2,shadowColor:itemColor==='#F7C946'?'rgba(247,201,70,0.5)':'rgba(0,0,0,0.1)',shadowBlur:itemColor==='#F7C946'?8:4}
    };
  });

  const linesSeries={
    type:'lines',
    coordinateSystem:'geo',
    data:[{coords:coords}],
    polyline:true,
    lineStyle:{color:'#E8923F',width:3,type:'dashed',opacity:0.8,shadowColor:'rgba(232,146,63,0.3)',shadowBlur:6},
    effect:{show:true,period:6,trailLength:0.3,symbol:'circle',symbolSize:6,color:'#F7C946'}
  };

  const scatterSeries={
    type:'scatter',
    coordinateSystem:'geo',
    data:scatterData,
    label:{
      show:true,
      formatter:function(p){return p.data.label+' '+p.data.city;},
      position:'top',
      fontSize:11,
      fontWeight:'bold',
      color:'#3D2C2C',
      textBorderColor:'#FEF9F0',
      textBorderWidth:2,
      padding:[3,6],
      backgroundColor:'rgba(255,253,248,0.85)',
      borderRadius:8
    },
    tooltip:{show:true}
  };

  // Update map with route
  const mapData=getMapData();
  const option=buildOption(mapData,linesSeries,scatterSeries);
  option.geo={
    map:'china',
    roam:true,
    aspectScale:0.78,
    scaleLimit:{min:0.8,max:6},
    label:{show:false},
    itemStyle:{areaColor:'transparent',borderColor:'#F0E4D4',borderWidth:0.5},
    emphasis:{itemStyle:{areaColor:'rgba(253,230,138,0.2)'}},
    silent:true
  };
  mapChart.setOption(option,true);

  // Show route summary
  showRouteSummary(route,scatterData);

  btn.disabled=false;
  btn.textContent='🗺️ 绘制追光路线';
}

function showRouteSummary(route,scatterData){
  const card=document.getElementById('route-card');
  const content=document.getElementById('route-content');
  card.classList.add('show');

  // Build route path string
  let pathHTML='';
  route.forEach((c,i)=>{
    const sd=scatterData.find(d=>d.city===c.name);
    const group=sd?sd.group:'cloudy';
    const cls=group==='sunny'?'rp-sunny':group==='rainy'?'rp-rainy':'rp-cloudy';
    const icon=group==='sunny'?'☀️':group==='rainy'?'🌧️':'⛅';
    if(i>0) pathHTML+=`<span class="rp-arrow">→</span>`;
    pathHTML+=`<span class="rp-city ${cls}">${icon} ${c.name}</span>`;
  });

  // Build tips
  const tips=[];
  route.forEach((c,i)=>{
    if(i===route.length-1)return;
    const sd=scatterData.find(d=>d.city===c.name);
    const sdNext=scatterData.find(d=>d.city===route[i+1].name);
    if(sdNext&&sdNext.group==='rainy'){
      tips.push(`${route[i+1].name}段可能有雨，建议缩短停留`);
    }
  });

  let tipHTML='';
  if(tips.length>0){
    tipHTML=`<div class="route-tip"><span class="tip-icon">💡</span><div><b>建议:</b> ${tips.join('；或备选绕行。')}</div></div>`;
  }else{
    tipHTML=`<div class="route-tip"><span class="tip-icon">☀️</span><div>整条路线天气状况良好，适合出行！</div></div>`;
  }

  // Build segments
  let segHTML='<div class="route-segments">';
  route.forEach((c,i)=>{
    if(i===route.length-1)return;
    const sd=scatterData.find(d=>d.city===route[i+1].name);
    const group=sd?sd.group:'cloudy';
    const isSunny=group==='sunny';
    const cls=isSunny?'sun':'rain';
    const label=isSunny?'☀️ 阳光路段':'🌧️ 阴雨路段';
    const barCls=group==='sunny'?'sun':group==='rainy'?'rain':'mixed';
    segHTML+=`<div class="route-seg">
      <span class="seg-label ${isSunny?'seg-sun':'seg-rain'}">${label}</span>
      <span style="color:var(--muted);font-size:0.78rem;min-width:100px">${c.name} → ${route[i+1].name}</span>
      <div class="seg-bar"><div class="seg-bar-fill ${barCls}" style="width:${isSunny?'100':'60'}%"></div></div>
    </div>`;
  });
  segHTML+='</div>';

  content.innerHTML=`
    <div class="route-title">🗺️ 推荐追光路线</div>
    <div class="route-path">${pathHTML}</div>
    ${tipHTML}
    ${segHTML}
    <div class="route-legend">
      <span><span class="legend-dot sunny"></span> 阳光充足 (&ge;4天晴)</span>
      <span><span class="legend-dot cloudy"></span> 时有阳光</span>
      <span><span class="legend-dot rainy"></span> 多阴雨 (&ge;4天雨)</span>
    </div>
  `;

  card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function clearRoute(){
  document.getElementById('route-from').value='';
  document.getElementById('route-to').value='';
  document.getElementById('route-card').classList.remove('show');
  // Reset map without route
  if(mapChart){
    const mapData=getMapData();
    const option=buildOption(mapData);
    // Remove geo component
    delete option.geo;
    mapChart.setOption(option,true);
  }
}
