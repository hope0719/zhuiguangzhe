<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=./light-chaser.html">
  <title>追光者 - 寻找阳光的方向</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FEF9F0;
      font-family: 'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', system-ui, sans-serif;
      color: #3D2C2C;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      background: #FFFDF8;
      border: 1px solid #F0E4D4;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(61, 44, 44, 0.08);
      max-width: 420px;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 8px;
      background: linear-gradient(135deg, #E8923F, #F7C946);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 14px;
      color: #A0897A;
      margin: 8px 0 20px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      padding: 10px 24px;
      background: linear-gradient(135deg, #E8923F, #F5A65B);
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(232, 146, 63, 0.25);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(232, 146, 63, 0.35);
    }
    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: #A0897A;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">☀️</div>
    <h1>追光者</h1>
    <p>正在前往阳光地图，寻找属于你的晴天...</p>
    <a href="./light-chaser.html">进入追光者</a>
    <div class="hint">如果没有自动跳转，请点击上方按钮</div>
  </div>
</body>
</html>
