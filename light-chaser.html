// WMO Weather Codes
const WMO_CODES = {
  0:  { desc: '晴朗', icon: '☀️', group: 'sunny', cn: '晴' },
  1:  { desc: '大部晴朗', icon: '🌤️', group: 'sunny', cn: '晴' },
  2:  { desc: '多云', icon: '⛅', group: 'cloudy', cn: '多云' },
  3:  { desc: '阴天', icon: '☁️', group: 'cloudy', cn: '阴' },
  45: { desc: '雾', icon: '🌫️', group: 'cloudy', cn: '雾' },
  48: { desc: '霜雾', icon: '🌫️', group: 'cloudy', cn: '雾' },
  51: { desc: '小毛毛雨', icon: '🌦️', group: 'rainy', cn: '雨' },
  53: { desc: '毛毛雨', icon: '🌦️', group: 'rainy', cn: '雨' },
  55: { desc: '大毛毛雨', icon: '🌧️', group: 'rainy', cn: '雨' },
  61: { desc: '小雨', icon: '🌦️', group: 'rainy', cn: '雨' },
  63: { desc: '中雨', icon: '🌧️', group: 'rainy', cn: '雨' },
  65: { desc: '大雨', icon: '🌧️', group: 'rainy', cn: '雨' },
  71: { desc: '小雪', icon: '🌨️', group: 'rainy', cn: '雪' },
  73: { desc: '中雪', icon: '🌨️', group: 'rainy', cn: '雪' },
  75: { desc: '大雪', icon: '❄️', group: 'rainy', cn: '雪' },
  80: { desc: '阵雨', icon: '🌦️', group: 'rainy', cn: '雨' },
  81: { desc: '中阵雨', icon: '🌧️', group: 'rainy', cn: '雨' },
  82: { desc: '大阵雨', icon: '🌧️', group: 'rainy', cn: '雨' },
  95: { desc: '雷暴', icon: '⛈️', group: 'storm', cn: '雷暴' },
  96: { desc: '雷暴+冰雹', icon: '⛈️', group: 'storm', cn: '雷暴' },
  99: { desc: '强雷暴', icon: '⛈️', group: 'storm', cn: '雷暴' },
};

// ===== State =====
let weatherCache = {};
let isLoading = false;

// ===== Weather API =====
async function fetchWeather(city) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,cloud_cover,apparent_temperature&daily=weather_code,temperature_2m_max,temperature_2m_min,sunshine_duration&timezone=auto&forecast_days=4`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

function getWeatherInfo(code) {
  return WMO_CODES[code] || { desc: '未知', icon: '❓', group: 'unknown', cn: '未知' };
}

// ===== Render Functions =====
function renderWeatherCards(cities, containerId) {
  const container = document.getElementById(containerId);
  if (!cities.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🌧️</div><p>没有找到符合条件的城市，换个筛选条件试试吧</p></div>`;
    return;
  }

  container.innerHTML = cities.map(c => {
    const data = weatherCache[cityKey(c)];
    if (!data) {
      return `<div class="weather-card"><div class="loading-spinner"><div class="spinner"></div><span>${c.name}</span></div></div>`;
    }
    const w = getWeatherInfo(data.current.weather_code);
    const daily = data.daily;
    const todaySunshine = daily.sunshine_duration ? daily.sunshine_duration[0] / 3600 : null;
    const isSunny = w.group === 'sunny';
    const isRainy = w.group === 'rainy' || w.group === 'storm';
    const cardClass = isSunny ? 'sunny' : (isRainy ? 'rainy' : '');

    // Build forecast row
    let forecastHtml = '';
    if (daily && daily.time) {
      forecastHtml = '<div class="forecast-row">';
      for (let i = 1; i < Math.min(daily.time.length, 4); i++) {
        const fw = getWeatherInfo(daily.weather_code[i]);
        const date = new Date(daily.time[i]);
        const label = i === 1 ? '明天' : `${date.getMonth()+1}/${date.getDate()}`;
        forecastHtml += `<div class="forecast-day">
          <div class="fd-label">${label}</div>
          <div class="fd-icon">${fw.icon}</div>
          <div class="fd-temp">${Math.round(daily.temperature_2m_max[i])}°/${Math.round(daily.temperature_2m_min[i])}°</div>
        </div>`;
      }
      forecastHtml += '</div>';
    }

    return `<div class="weather-card ${cardClass}" onclick="showCityDetail('${c.name}')">
      <div class="card-header">
        <div>
          <span class="city-name">${c.name}</span>
          <span class="city-region">${regionLabel(c.region)}</span>
        </div>
        <div class="weather-icon">${w.icon}</div>
      </div>
      <div class="card-temp">${Math.round(data.current.temperature_2m)}<span class="unit">°C</span></div>
      <div class="card-desc">${w.desc} · 体感 ${Math.round(data.current.apparent_temperature)}°C</div>
      <div class="card-meta">
        <span>💨 ${Math.round(data.current.wind_speed_10m)} km/h</span>
        <span>💧 ${data.current.relative_humidity_2m}%</span>
        ${todaySunshine !== null ? `<span>☀️ ${todaySunshine.toFixed(1)}h</span>` : ''}
      </div>
      ${isSunny ? '<div class="sun-badge">✨ 推荐追光</div>' : ''}
      ${forecastHtml}
    </div>`;
  }).join('');
}

function regionLabel(r) {
  const labels = { china: '中国', asia: '亚洲', europe: '欧洲', oceania: '大洋洲', americas: '美洲' };
  return labels[r] || r;
}

function cityKey(c) { return `${c.name}_${c.lat}_${c.lon}`; }

// ===== Load All Cities =====
async function refreshAllCities() {
  if (isLoading) return;
  isLoading = true;
  const btn = document.getElementById('btn-refresh-all');
  btn.disabled = true;
  btn.textContent = '⏳ 加载中…';

  const grid = document.getElementById('weather-grid');
  grid.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><span>正在从气象局获取数据…</span></div>`;

  const regionFilter = document.getElementById('region-filter').value;
  const cities = regionFilter === 'all' ? CITIES : CITIES.filter(c => c.region === regionFilter);

  // Fetch in batches
  const batchSize = 8;
  for (let i = 0; i < cities.length; i += batchSize) {
    const batch = cities.slice(i, i + batchSize);
    const results = await Promise.allSettled(batch.map(c => fetchWeather(c)));
    results.forEach((r, idx) => {
      const city = batch[idx];
      if (r.status === 'fulfilled') {
        weatherCache[cityKey(city)] = { ...r.value, _city: city };
      }
    });
    // Render intermediate results
    applyFiltersAndRender();
  }

  isLoading = false;
  btn.disabled = false;
  btn.textContent = '🔄 刷新天气';
  showToast('天气数据已更新 ✨');
}

function applyFiltersAndRender() {
  const regionFilter = document.getElementById('region-filter').value;
  const weatherFilter = document.getElementById('weather-filter').value;

  let cities = regionFilter === 'all' ? CITIES : CITIES.filter(c => c.region === regionFilter);

  if (weatherFilter === 'sunny') {
    cities = cities.filter(c => {
      const data = weatherCache[cityKey(c)];
      if (!data) return false;
      const w = getWeatherInfo(data.current.weather_code);
      return w.group === 'sunny';
    });
  } else if (weatherFilter === 'dry') {
    cities = cities.filter(c => {
      const data = weatherCache[cityKey(c)];
      if (!data) return false;
      const w = getWeatherInfo(data.current.weather_code);
      return w.group !== 'rainy' && w.group !== 'storm';
    });
  }

  renderWeatherCards(cities, 'weather-grid');
}

// ===== City Detail =====
function showCityDetail(name) {
  const data = weatherCache[cityKey(CITIES.find(c => c.name === name))];
  if (!data) return;
  const w = getWeatherInfo(data.current.weather_code);
  const city = data._city;
  const msg = `${city.name} · ${w.icon} ${w.desc} · ${Math.round(data.current.temperature_2m)}°C · 体感${Math.round(data.current.apparent_temperature)}°C · 湿度${data.current.relative_humidity_2m}% · 风速${Math.round(data.current.wind_speed_10m)}km/h`;
  showToast(msg, 4000);
}

// ===== Route Planner =====
function populateRouteSelects() {
  const from = document.getElementById('route-from');
  const to = document.getElementById('route-to');
  const opts = CITIES.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
  from.innerHTML = '<option value="">选择出发城市</option>' + opts;
  to.innerHTML = '<option value="">选择目的地</option>' + opts;
}

async function planRoute() {
  const fromName = document.getElementById('route-from').value;
  const toName = document.getElementById('route-to').value;
  const results = document.getElementById('route-results');

  if (!fromName || !toName) {
    showToast('请选择出发城市和目的地 ✈️');
    return;
  }
  if (fromName === toName) {
    showToast('出发地和目的地不能相同哦 😊');
    return;
  }

  const fromCity = CITIES.find(c => c.name === fromName);
  const toCity = CITIES.find(c => c.name === toName);

  // Ensure both cities have weather data
  results.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><span>正在规划路线…</span></div>`;
  results.classList.add('visible');

  for (const city of [fromCity, toCity]) {
    if (!weatherCache[cityKey(city)]) {
      try {
        const data = await fetchWeather(city);
        weatherCache[cityKey(city)] = { ...data, _city: city };
      } catch (e) {
        showToast(`获取${city.name}天气失败，请重试`);
        return;
      }
    }
  }

  // Find intermediate sunny cities
  const fromData = weatherCache[cityKey(fromCity)];
  const toData = weatherCache[cityKey(toCity)];
  const fromW = getWeatherInfo(fromData.current.weather_code);
  const toW = getWeatherInfo(toData.current.weather_code);

  // Find sunny cities between them (roughly)
  const midLat = (fromCity.lat + toCity.lat) / 2;
  const midLon = (fromCity.lon + toCity.lon) / 2;

  const nearbyCities = CITIES
    .filter(c => c.name !== fromName && c.name !== toName)
    .map(c => {
      const dlat = c.lat - midLat;
      const dlon = c.lon - midLon;
      const dist = Math.sqrt(dlat*dlat + dlon*dlon);
      return { ...c, dist };
    })
    .sort((a, b) => a.dist - b.dist)
    .slice(0, 12);

  // Fetch weather for nearby cities if not cached
  const uncached = nearbyCities.filter(c => !weatherCache[cityKey(c)]);
  if (uncached.length) {
    const batchResults = await Promise.allSettled(uncached.map(c => fetchWeather(c)));
    batchResults.forEach((r, idx) => {
      const city = uncached[idx];
      if (r.status === 'fulfilled') {
        weatherCache[cityKey(city)] = { ...r.value, _city: city };
      }
    });
  }

  const sunnyStops = nearbyCities.filter(c => {
    const data = weatherCache[cityKey(c)];
    if (!data) return false;
    return getWeatherInfo(data.current.weather_code).group === 'sunny';
  });

  const rainyStops = nearbyCities.filter(c => {
    const data = weatherCache[cityKey(c)];
    if (!data) return false;
    return getWeatherInfo(data.current.weather_code).group === 'rainy' || getWeatherInfo(data.current.weather_code).group === 'storm';
  });

  let verdict = '';
  if (fromW.group === 'sunny' && toW.group === 'sunny') {
    verdict = '🌟 完美！出发地和目的地都是晴天，放心出发吧！';
  } else if (fromW.group === 'sunny') {
    verdict = `⚠️ 出发地${fromName}阳光明媚，但目的地${toName}天气为「${toW.desc}」，建议关注天气变化`;
  } else if (toW.group === 'sunny') {
    verdict = `🌈 出发地${fromName}天气「${fromW.desc}」，但目的地${toName}正是晴天，值得前往！`;
  } else {
    verdict = `🌧️ 两地天气都不太理想，建议看看下方推荐的阳光城市`;
  }

  results.innerHTML = `
    <div class="route-summary">
      <h3>${fromName} ${fromW.icon} → ${toName} ${toW.icon}</h3>
      <p class="route-verdict">${verdict}</p>
    </div>
    ${sunnyStops.length > 0 ? `
    <div class="section-header" style="margin-top: 20px;">
      <h2>✨ 沿途推荐阳光城市</h2>
      <p>这些城市今天天气晴朗，可以作为中途停留的选择</p>
    </div>
    <div class="route-cities">
      ${sunnyStops.map(c => {
        const d = weatherCache[cityKey(c)];
        const w = getWeatherInfo(d.current.weather_code);
        return `<div class="route-city-card suggested" onclick="showCityDetail('${c.name}')">
          <div class="rcc-name">${c.name}</div>
          <div class="rcc-weather">${w.icon} ${w.desc} · ${Math.round(d.current.temperature_2m)}°C</div>
        </div>`;
      }).join('')}
    </div>` : ''}
    ${rainyStops.length > 0 ? `
    <div class="section-header" style="margin-top: 20px;">
      <h2>🌧️ 建议避开</h2>
      <p>以下沿途城市有降雨，建议绕行</p>
    </div>
    <div class="route-cities">
      ${rainyStops.map(c => {
        const d = weatherCache[cityKey(c)];
        const w = getWeatherInfo(d.current.weather_code);
        return `<div class="route-city-card">
          <div class="rcc-name">${c.name}</div>
          <div class="rcc-weather">${w.icon} ${w.desc} · ${Math.round(d.current.temperature_2m)}°C</div>
        </div>`;
      }).join('')}
    </div>` : ''}
  `;
}

// ===== Toast =====
function showToast(msg, duration = 2500) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), duration);
}

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
    });
  });

  // Filter changes
  document.getElementById('region-filter').addEventListener('change', () => {
    applyFiltersAndRender();
    // If switching to a region with no cached data, auto-refresh
    const region = document.getElementById('region-filter').value;
    const cities = region === 'all' ? CITIES : CITIES.filter(c => c.region === region);
    const hasAnyData = cities.some(c => weatherCache[cityKey(c)]);
    if (!hasAnyData) refreshAllCities();
  });
  document.getElementById('weather-filter').addEventListener('change', applyFiltersAndRender);

  // Populate route selects
  populateRouteSelects();

  // Initial load
  refreshAllCities();
});
</script>
