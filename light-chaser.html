// ===== UV Health =====
function getUVInfo(uv){
  if(uv==null||uv===undefined) return {level:'未知',cls:'uv-moderate',tip:'暂无UV数据',advice:'无法提供日晒建议'};
  if(uv<=2) return {level:'低',cls:'uv-low',tip:'UV '+uv+' 低',advice:'无需特别防护，适合户外活动'};
  if(uv<=5) return {level:'中等',cls:'uv-moderate',tip:'UV '+uv+' 中等',advice:'建议涂抹SPF30+防晒霜，戴帽子'};
  if(uv<=7) return {level:'高',cls:'uv-high',tip:'UV '+uv+' 高',advice:'减少10:00-16:00日晒，涂SPF50+防晒霜，戴墨镜'};
  if(uv<=10) return {level:'很高',cls:'uv-vhigh',tip:'UV '+uv+' 很高',advice:'尽量避免10:00-16:00外出，必须涂防晒霜'};
  return {level:'极高',cls:'uv-vhigh',tip:'UV '+uv+' 极高',advice:'避免户外活动，外出需全面防护'};
}

function getSunshineAdvice(hours){
  if(hours==null) return '';
  if(hours>=10) return '日照充足，心情UP！适合户外拍照散步';
  if(hours>=6) return '日照良好，适合出游';
  if(hours>=3) return '日照一般，建议携带外套';
  return '日照不足，记得补充维生素D';
}

// ===== Helpers =====
function getWeatherInfo(code){return WMO_CODES[code]||{desc:'未知',icon:'❓',group:'unknown'}}
function regionLabel(r){return{china:'中国',asia:'亚洲',europe:'欧洲',oceania:'大洋洲',americas:'美洲',africa:'非洲'}[r]||r}
function cityKey(c){return c.name+'_'+c.lat+'_'+c.lon}
function countSunnyDays(data){if(!data?.daily?.weather_code)return 0;return data.daily.weather_code.filter(c=>getWeatherInfo(c).group==='sunny').length}
function getSunshineHours(data){return data?.daily?.sunshine_duration?data.daily.sunshine_duration[0]/3600:0}
function isFav(name){return favorites.includes(name)}
function toggleFav(name){if(isFav(name)){favorites=favorites.filter(n=>n!==name)}else{favorites.push(name)}localStorage.setItem('lc_favs',JSON.stringify(favorites))}

// ===== Date Suitability =====
function getDateSuitability(data,startD,endD){
  if(!startD||!endD||!data?.daily?.time) return {score:0,cls:'ok',label:'--'};
  const start=new Date(startD),end=new Date(endD);
  let sunny=0,total=0, rainy=0;
  data.daily.time.forEach((t,i)=>{
    const d=new Date(t);
    if(d>=start&&d<=end){total++;const g=getWeatherInfo(data.daily.weather_code[i]).group;if(g==='sunny')sunny++;if(g==='rainy'||g==='storm')rainy++}
  });
  if(total===0)return {score:0,cls:'ok',label:'无数据'};
  const score=Math.round((sunny/total)*100);
  if(score>=70)return {score,cls:'good',label:sunny+'/'+total+'天晴'};
  if(rainy===0)return {score,cls:'ok',label:sunny+'/'+total+'天晴'};
  return {score,cls:'bad',label:rainy+'天有雨'};
}

// ===== API =====
async function fetchWeather(city){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,cloud_cover,apparent_temperature,uv_index&daily=weather_code,temperature_2m_max,temperature_2m_min,sunshine_duration,precipitation_sum,uv_index_max&timezone=auto&forecast_days=7`;
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),10000);
  try{const r=await fetch(url,{signal:ctrl.signal});clearTimeout(timer);if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}
  catch(e){clearTimeout(timer);throw e}
}

function renderWeatherCards(cities,cid){
  const el=document.getElementById(cid);

  const today=new Date();
  el.innerHTML=cities.map(c=>{
    const d=weatherCache[cityKey(c)];
    if(!d)return `<div class="weather-card placeholder"><button class="fav-btn ${isFav(c.name)?'active':''}" onclick="event.stopPropagation();toggleFav('${c.name.replace(/'/g,"\\'")}');applyFiltersAndRender()">${isFav(c.name)?'💛':'🤍'}</button><div class="card-header"><div><span class="city-name">${c.name}</span><span class="city-region">${regionLabel(c.region)}</span></div></div><div class="ph-icon" style="margin:0 auto"></div><div class="ph-temp"></div><div class="ph-desc"></div><div class="ph-meta"><div class="ph-mi"></div><div class="ph-mi"></div><div class="ph-mi"></div></div><div class="ph-forecast"><div class="ph-fd"></div><div class="ph-fd"></div><div class="ph-fd"></div><div class="ph-fd"></div></div></div>`;
    const w=getWeatherInfo(d.current.weather_code),daily=d.daily;
    const sunH=daily.sunshine_duration?daily.sunshine_duration[0]/3600:null;
    const sDays=countSunnyDays(d),maxS=14,sunPct=sunH!==null?Math.min((sunH/maxS)*100,100):0;
    const isS=w.group==='sunny',isR=w.group==='rainy'||w.group==='storm';
    const recommendChase=isS&&(daily?.weather_code?.slice(0,4)||[]).every(c=>getWeatherInfo(c).group==='sunny');
    const uv=d.current.uv_index,uvI=getUVInfo(uv);
    const suit=getDateSuitability(d,dateFilterStart,dateFilterEnd);
    // Fav button
    const favCls=isFav(c.name)?'fav-btn active':'fav-btn';
    const favIcon=isFav(c.name)?'💛':'🤍';
    // Date filter badge
    let dateBadge='';
    if(dateFilterStart&&dateFilterEnd) dateBadge=`<span class="date-suitability ${suit.cls}">📅 ${suit.label}</span>`;
    // Forecast
    let fH='';
    if(daily?.time){
      fH='<div class="forecast-row">';
      for(let i=1;i<Math.min(daily.time.length,5);i++){
        const fw=getWeatherInfo(daily.weather_code[i]),dt=new Date(daily.time[i]);
        const diff=Math.round((dt-today)/864e5);
        const lb=diff===1?'明天':diff===2?'后天':(dt.getMonth()+1)+'/'+dt.getDate();
        fH+=`<div class="forecast-day"><div class="fd-label">${lb}</div><div class="fd-icon">${fw.icon}</div></div>`;
      }
      fH+='</div>';
    }
    return `<div class="weather-card ${isS?'sunny':''} ${isR?'rainy':''}" onclick="openCityDetail('${c.name.replace(/'/g,"\\'")}')">
      <button class="${favCls}" onclick="event.stopPropagation();toggleFav('${c.name.replace(/'/g,"\\'")}');applyFiltersAndRender();renderFavorites()">${favIcon}</button>
      <div class="card-header"><div><span class="city-name">${c.name}</span><span class="city-region">${regionLabel(c.region)}</span></div><div class="weather-icon">${w.icon}</div></div>
      <div class="card-temp-row"><div class="card-temp">${Math.round(d.current.temperature_2m)}<span class="unit">°C</span></div>${recommendChase?'<div class="sun-badge">✨ 推荐追光</div>':''}</div>
      <div class="card-desc"><span>${w.desc} · 体感${Math.round(d.current.apparent_temperature)}°C</span><span class="uv-badge ${uvI.cls}">UV ${uv!=null?uv:'--'}</span></div>
      <div class="card-meta">
        <span>💨${Math.round(d.current.wind_speed_10m)}km/h</span>
        <span>💧${d.current.relative_humidity_2m}%</span>
        <span>📅${sDays}天晴</span>
      </div>
      ${dateBadge}
      <div class="sunshine-bar-wrap"><div class="sunshine-bar-label"><span>日照</span><span>${sunH!==null?sunH.toFixed(1)+'h':'--'}</span></div><div class="sunshine-bar"><div class="sunshine-bar-fill" style="width:${sunPct}%"></div></div></div>
      ${fH}
    </div>`;
  }).join('');
}

// ===== Load =====
async function refreshAllCities(){
  if(isLoading)return;isLoading=true;
  const btn=document.getElementById('btn-refresh-all');btn.disabled=true;btn.textContent='⏳…';
  const grid=document.getElementById('weather-grid');
  const rf=document.getElementById('region-filter').value;
  const cities=rf==='all'?CITIES:CITIES.filter(c=>c.region===rf);
  // Immediately render all cities as placeholder cards
  applyFiltersAndRender();
  const bs=10;
  for(let i=0;i<cities.length;i+=bs){
    const batch=cities.slice(i,i+bs);
    const res=await Promise.allSettled(batch.map(c=>fetchWeather(c)));
    res.forEach((r,idx)=>{if(r.status==='fulfilled')weatherCache[cityKey(batch[idx])]={...r.value,_city:batch[idx]}});
    applyFiltersAndRender();
    if(i===0&&window._dismissSplash)window._dismissSplash();
  }
  lastUpdateTime=new Date();updateTimestamp();isLoading=false;btn.disabled=false;btn.textContent='🔄';
  document.getElementById('btn-daily-brief').style.display='inline-flex';
  showToast('天气数据已更新 ✨');renderFavorites();
  // Auto-plan default route (广州→北京) after initial load
  if(!window._routeAutoPlanned){window._routeAutoPlanned=true;planRoute()}
}

function applyFiltersAndRender(){
  const rf=document.getElementById('region-filter').value;
  const wf=document.getElementById('weather-filter').value;
  const sf=document.getElementById('sort-filter').value;
  let cities=rf==='all'?[...CITIES]:CITIES.filter(c=>c.region===rf);
  if(wf==='sunny'){cities=cities.filter(c=>{const d=weatherCache[cityKey(c)];return d&&getWeatherInfo(d.current.weather_code).group==='sunny'})}
  else if(wf==='dry'){cities=cities.filter(c=>{const d=weatherCache[cityKey(c)];if(!d)return false;const g=getWeatherInfo(d.current.weather_code).group;return g!=='rainy'&&g!=='storm'})}
  else if(wf==='favorites'){cities=cities.filter(c=>isFav(c.name))}
  if(sf==='sunshine')cities.sort((a,b)=>getSunshineHours(weatherCache[cityKey(b)])-getSunshineHours(weatherCache[cityKey(a)]));
  else if(sf==='temp')cities.sort((a,b)=>(weatherCache[cityKey(b)]?.current?.temperature_2m||0)-(weatherCache[cityKey(a)]?.current?.temperature_2m||0));
  else if(sf==='sunny-days')cities.sort((a,b)=>countSunnyDays(weatherCache[cityKey(b)])-countSunnyDays(weatherCache[cityKey(a)]));
  else if(sf==='uv-safety')cities.sort((a,b)=>{
    const ua=weatherCache[cityKey(a)]?.current?.uv_index,bv=weatherCache[cityKey(b)]?.current?.uv_index;
    // Prefer UV 3-6 (moderate, healthy sunshine)
    const scoreA=ua==null?-99:(ua>=3&&ua<=6)?100-Math.abs(ua-4.5)*10:ua<3?ua*5:Math.max(0,100-ua*8);
    const scoreB=bv==null?-99:(bv>=3&&bv<=6)?100-Math.abs(bv-4.5)*10:bv<3?bv*5:Math.max(0,100-bv*8);
    return scoreB-scoreA;
  });
  renderWeatherCards(cities,'weather-grid');
}

  const uv=d.current.uv_index,uvI=getUVInfo(uv);

    const all=[...temps,...tMin],mn=Math.min(...all)-2,mx=Math.max(...all)+2,rng=Math.max(mx-mn,1);
    const W=440,H=155,pX=38,pY=18,pW=W-pX*2,pH=H-pY*2;

    for(let i=0;i<=4;i++){const v=Math.round(mn+(rng/4)*i),y=ty(v);grid+=`<line x1="${pX}" y1="${y}" x2="${W-pX}" y2="${y}" stroke="#F0E4D4" stroke-width="1"/><text x="${pX-6}" y="${y+4}" text-anchor="end" fill="#A0897A" font-size="10">${v}°</text>`}

    trendSvg=`<svg class="trend-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${grid}<path d="M${mPts.join(' L')} L${tx(days-1)},${H-pY} L${tx(0)},${H-pY} Z" fill="rgba(232,146,63,0.1)"/><polyline points="${mPts.join(' ')}" fill="none" stroke="#E8923F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><polyline points="${nPts.join(' ')}" fill="none" stroke="#F5A65B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4,3"/>${labels}${mPts.map((p,i)=>`<circle cx="${tx(i)}" cy="${ty(temps[i])}" r="4" fill="#E8923F" stroke="#fff" stroke-width="2"/>`).join('')}${mPts.map((p,i)=>`<text x="${tx(i)}" y="${ty(temps[i])-8}" text-anchor="middle" fill="#E8923F" font-size="10" font-weight="700">${temps[i]}°</text>`).join('')}</svg>`;

      const precip=daily.precipitation_sum?daily.precipitation_sum[i]:0;

        <div style="font-size:0.68rem;color:var(--muted)">${lb}</div>
        <div style="font-size:1.2rem">${fw.icon}</div>
        <div style="font-size:0.75rem;font-weight:700;margin-top:2px">${Math.round(daily.temperature_2m_max[i])}°/${Math.round(daily.temperature_2m_min[i])}°</div>
        ${uvMax!=null?`<div class="uv-badge ${getUVInfo(uvMax).cls}" style="display:inline-block;font-size:0.62rem;margin-top:1px">UV${uvMax}</div>`:''}

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

// Project point P onto line segment AB, return projection parameter t (0~1)
function projParam(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,lenSq=dx*dx+dy*dy;
  if(lenSq===0)return 0;
  return Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/lenSq));
}

// Get cities along the route for train/drive (geographic projection)
function getAlongRouteCities(fc,tc){
  const chinaCities=CITIES.filter(c=>c.region==='china'&&c.name!==fc.name&&c.name!==tc.name);
  const scored=chinaCities.map(c=>{
    const t=projParam(c.lon,c.lat,fc.lon,fc.lat,tc.lon,tc.lat);
    // Distance from city to the line segment
    const projLon=fc.lon+t*(tc.lon-fc.lon),projLat=fc.lat+t*(tc.lat-fc.lat);
    const dist=Math.sqrt((c.lon-projLon)**2+(c.lat-projLat)**2);
    // Convert approx degree distance to km (1 deg ≈ 100km)
    const distKm=dist*100;
    return{...c,t,distKm};
  });
  // Filter: within 200km of the route line, sort by t (position along route)
  return scored.filter(c=>c.distKm<=200).sort((a,b)=>a.t-b.t);
}

async function planRoute(){
  const fn=document.getElementById('route-from').value,tn=document.getElementById('route-to').value,res=document.getElementById('route-results');
  if(!fn||!tn){showToast('请选择出发城市和目的地');return}
  if(fn===tn){showToast('出发地和目的地不能相同');return}
  const fc=CITIES.find(c=>c.name===fn),tc=CITIES.find(c=>c.name===tn);
  res.innerHTML='<div class="loading-spinner"><div class="spinner"></div><span>正在规划…</span></div>';res.classList.add('visible');

  // Determine which cities need data
  let routeCities=[fc,tc];
  if(currentTransport!=='fly'){
    const along=getAlongRouteCities(fc,tc);
    routeCities=routeCities.concat(along);
  }
  // Fetch missing weather
  const unc=routeCities.filter(c=>!weatherCache[cityKey(c)]);
  if(unc.length){const br=await Promise.allSettled(unc.map(c=>fetchWeather(c)));br.forEach((r,i)=>{if(r.status==='fulfilled')weatherCache[cityKey(unc[i])]={...r.value,_city:unc[i]}})}

  const fd=weatherCache[cityKey(fc)],td=weatherCache[cityKey(tc)],fw=getWeatherInfo(fd.current.weather_code),tw=getWeatherInfo(td.current.weather_code);
  const tl={fly:'✈️ 飞机',train:'🚄 高铁',drive:'🚗 自驾'}[currentTransport];
  let v='';if(fw.group==='sunny'&&tw.group==='sunny')v='🌟 完美！两地都是晴天';else if(fw.group==='sunny')v=`⚠️ ${fn}晴天，但${tn}「${tw.desc}」`;else if(tw.group==='sunny')v=`🌈 ${fn}「${fw.desc}」，${tn}晴天值得去`;else v='🌧️ 两地都不太理想，看沿途天气';

  // Build Z-shape timeline
  let citiesInRoute;
  if(currentTransport==='fly'){
    citiesInRoute=[fc,tc];
  }else{
    const along=getAlongRouteCities(fc,tc);
    citiesInRoute=[fc,...along,tc];
  }
  const PER_ROW=5;
  const rows=[];
  for(let i=0;i<citiesInRoute.length;i+=PER_ROW)rows.push(citiesInRoute.slice(i,i+PER_ROW));

  let tlHtml='<div class="route-timeline">';
  rows.forEach((row,ri)=>{
    const reverse=ri%2===1;
    const displayRow=reverse?[...row].reverse():row;
    const arrow=reverse?'←':'→';
    tlHtml+=`<div class="tl-row ${reverse?'reverse':''}">`;
    displayRow.forEach((c,i)=>{
      const d=weatherCache[cityKey(c)],w=getWeatherInfo(d.current.weather_code);
      const isOrigin=citiesInRoute.indexOf(c)===0;
      const isDest=citiesInRoute.indexOf(c)===citiesInRoute.length-1;
      const cls=isOrigin?'origin':isDest?'destination':'waypoint';
      if(i>0)tlHtml+=`<div class="timeline-arrow">${arrow}</div>`;
      tlHtml+=`<div class="timeline-city ${cls}" onclick="openCityDetail('${c.name}')"><div class="tc-name">${c.name}</div><div class="tc-weather">${w.icon} ${Math.round(d.current.temperature_2m)}°C</div></div>`;
    });
    tlHtml+='</div>';
    // Turn indicator between rows
    if(ri<rows.length-1){
      const turnDir=reverse?'left':'right';
      tlHtml+=`<div class="tl-turn ${turnDir}">${reverse?'↙':'↘'}</div>`;
    }
  });
  tlHtml+='</div>';

  // Find sunny/rainy cities for additional suggestions (non-route)
  const routeNames=new Set(citiesInRoute.map(c=>c.name));
  const otherCities=CITIES.filter(c=>!routeNames.has(c.name)&&(currentTransport==='fly'||c.region==='china'));
  const sunny=otherCities.filter(c=>{const d=weatherCache[cityKey(c)];return d&&getWeatherInfo(d.current.weather_code).group==='sunny'}).slice(0,4);
  const rainy=otherCities.filter(c=>{const d=weatherCache[cityKey(c)];return d&&(getWeatherInfo(d.current.weather_code).group==='rainy'||getWeatherInfo(d.current.weather_code).group==='storm')}).slice(0,3);

  res.innerHTML=`<div class="route-summary"><h3>${fn} ${fw.icon} → ${tn} ${tw.icon}</h3><p class="route-verdict">${v}</p><p class="route-transport">${tl}${currentTransport!=='fly'?' · 沿途'+(citiesInRoute.length-2)+'站':''}</p></div>
${tlHtml}
${sunny.length?`<div class="route-section-title">✨ 其他阳光推荐</div><div class="route-cities">${sunny.map(c=>{const d=weatherCache[cityKey(c)],w=getWeatherInfo(d.current.weather_code);return`<div class="route-city-card suggested" onclick="openCityDetail('${c.name}')"><div class="rcc-name">${c.name}</div><div class="rcc-weather">${w.icon} ${w.desc} · ${Math.round(d.current.temperature_2m)}°C</div></div>`}).join('')}</div>`:''}
${rainy.length?`<div class="route-section-title">🌧️ 建议避开</div><div class="route-cities">${rainy.map(c=>{const d=weatherCache[cityKey(c)],w=getWeatherInfo(d.current.weather_code);return`<div class="route-city-card" onclick="openCityDetail('${c.name}')"><div class="rcc-name">${c.name}</div><div class="rcc-weather">${w.icon} ${w.desc} · ${Math.round(d.current.temperature_2m)}°C</div></div>`}).join('')}</div>`:''}`;
}

async function mapLoadAll(){

    if(loadText)loadText.textContent='天气数据 '+Math.min(i+bs,items.length)+'/'+items.length;

    if(mapInited&&mapGeoLoaded)mapRender();

  const ld=document.getElementById('map-loading');
  if(ld){ld.style.opacity='0';setTimeout(()=>{if(ld)ld.style.display='none'},500);}

// Route
function mapDist(a,b){const R=6371,dL=(b.lat-a.lat)*Math.PI/180,dN=(b.lon-a.lon)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function mapFindMid(from,to,max){
  const cands=MAP_CITIES.filter(c=>c.name!==from.name&&c.name!==to.name),td=mapDist(from,to),step=td/(max+1),sel=[],used=new Set([from.name,to.name]);
  for(let i=1;i<=max;i++){const tr=step*i;let best=null,bd=Infinity;
    cands.forEach(c=>{if(used.has(c.name))return;const r=mapDist(from,c)/Math.max(td,1),d=Math.abs(r-i/(max+1));if(d<bd){bd=d;best=c}});
    if(best&&bd<0.35){sel.push(best);used.add(best.name)}}return sel;
}
function mapWGroup(d){if(!d||!d.daily)return'cloudy';let s=0,r=0;(d.daily.weather_code||[]).forEach(c=>{const w=WMO_CODES[c];if(!w)return;if(w.group==='sunny')s++;else if(w.group==='rainy'||w.group==='storm')r++});return s>=4?'sunny':r>=4?'rainy':s>=2?'cloudy':r>=2?'rainy':'cloudy'}

async function mapDrawRoute(){

  const fc=MAP_CITIES.find(c=>c.name===fn),tc=MAP_CITIES.find(c=>c.name===tn);if(!fc||!tc)return;
  const btn=document.getElementById('btn-map-route');btn.disabled=true;btn.textContent='⏳…';
  const d=mapDist(fc,tc);let ms=d>2500?5:d>1500?4:d>800?3:d>400?2:1;
  const mids=mapFindMid(fc,tc,ms),route=[fc,...mids,tc];
  await Promise.allSettled(route.map(c=>mapFetch(c.lat,c.lon)));
  const coords=route.map(c=>[c.lon,c.lat]);
  const scatter=route.map(c=>{const k=c.lat.toFixed(2)+','+c.lon.toFixed(2),d=mapWCache[k],g=mapWGroup(d),cur=d?d.current:{},w=mapWK(cur.weather_code),t=cur.temperature_2m!=null?Math.round(cur.temperature_2m)+'°C':'--';
    const lb=g==='sunny'?'☀️':g==='rainy'?'🌧️':'⛅',sz=g==='sunny'?18:g==='rainy'?10:14,clr=g==='sunny'?'#F7C946':g==='rainy'?'#A0897A':'#C0C0C0';
    return{name:c.name,value:[c.lon,c.lat],city:c.name,weather:w.icon+' '+w.desc,temp:t,group:g,label:lb,symbolSize:sz,itemStyle:{color:clr,borderColor:'#fff',borderWidth:2}}});
  const lines={type:'lines',coordinateSystem:'geo',data:[{coords:coords}],polyline:true,lineStyle:{color:'#E8923F',width:3,type:'dashed',opacity:0.8},effect:{show:true,period:6,trailLength:0.3,symbol:'circle',symbolSize:6,color:'#F7C946'}};
  const sc={type:'scatter',coordinateSystem:'geo',data:scatter,label:{show:true,formatter:p=>p.data.label+' '+p.data.city,position:'top',fontSize:11,fontWeight:'bold',color:'#3D2C2C',textBorderColor:'#FEF9F0',textBorderWidth:2,padding:[3,6],backgroundColor:'rgba(255,253,248,0.85)',borderRadius:8},tooltip:{show:true}};
  const data=mapGetMapData(),opt=mapBuildOpt(data,lines,sc);
  opt.geo={map:'china',roam:true,aspectScale:0.78,scaleLimit:{min:0.8,max:6},label:{show:false},itemStyle:{areaColor:'transparent',borderColor:'#F0E4D4',borderWidth:0.5},emphasis:{itemStyle:{areaColor:'rgba(253,230,138,0.2)'}},silent:true};
  mapChart.setOption(opt,true);
  // Summary
  let pathH='';route.forEach((c,i)=>{const sd=scatter.find(s=>s.city===c.name),g=sd?sd.group:'cloudy',cls=g==='sunny'?'background:linear-gradient(135deg,#FEF3D5,#FDE68A);color:#92400E':g==='rainy'?'background:#F0F4F8;color:#64748B':'background:#F5F5F5;color:#525252',ic=g==='sunny'?'☀️':g==='rainy'?'🌧️':'⛅';
    if(i>0)pathH+='<span style="color:var(--muted);margin:0 4px">→</span>';pathH+='<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:14px;font-weight:600;'+cls+'">'+ic+' '+c.name+'</span>';});
  const tips=[];route.forEach((c,i)=>{if(i===route.length-1)return;const sd=scatter.find(s=>s.city===route[i+1].name);if(sd&&sd.group==='rainy')tips.push(route[i+1].name+'段可能有雨')});
  const tipH=tips.length?'<div style="padding:12px 16px;background:linear-gradient(135deg,#FFFDF5,#FEF9F0);border:1px solid #FDE68A;border-radius:var(--radius-sm);font-size:0.85rem;margin-bottom:14px;display:flex;gap:8px"><span>💡</span><div><b>建议:</b> '+tips.join('；')+'</div></div>':'<div style="padding:12px 16px;background:linear-gradient(135deg,#FFFDF5,#FEF9F0);border:1px solid #FDE68A;border-radius:var(--radius-sm);font-size:0.85rem;margin-bottom:14px">☀️ 整条路线天气良好，适合出行！</div>';
  document.getElementById('map-route-summary').innerHTML='<div style="background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius-md);padding:22px;box-shadow:var(--shadow-sm);animation:modalIn 0.3s ease"><div style="font-size:1.1rem;font-weight:700;margin-bottom:12px">🗺️ 推荐追光路线</div><div style="font-size:0.95rem;line-height:2;margin-bottom:14px;word-break:break-all">'+pathH+'</div>'+tipH+'<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:0.78rem;color:var(--muted)"><span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#F7C946;box-shadow:0 0 6px rgba(247,201,70,0.5)"></span>阳光充足</span><span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#C0C0C0"></span>时有阳光</span><span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#A0897A;opacity:0.6"></span>多阴雨</span></div></div>';
  btn.disabled=false;btn.textContent='🗺️ 绘制路线';
}
function mapClearRoute(){
  document.getElementById('map-route-from').value='';document.getElementById('map-route-to').value='';
  document.getElementById('map-route-summary').innerHTML='';
  if(mapChart){mapChart.setOption(mapBuildOpt(mapGetMapData()),true)}
}
</script>
</div><!-- end main-app -->
<!-- Splash Controller -->
<script>
(function(){
  const bar=document.getElementById('splash-bar'),splash=document.getElementById('splash'),
        cl=document.getElementById('curtain-l'),cr=document.getElementById('curtain-r'),
        app=document.getElementById('main-app');
  let progress=0;
  function tick(){
    progress+=Math.random()*12+3;
    if(progress>90)progress=90;
    bar.style.width=progress+'%';
    if(progress<90)setTimeout(tick,200+Math.random()*300);
  }
  setTimeout(tick,400);
  // Dismiss splash when first data batch arrives or after timeout
  function dismissSplash(){
    if(splash._dismissed)return;splash._dismissed=true;
    bar.style.width='100%';
    setTimeout(()=>{
      splash.style.transition='opacity 0.5s ease';splash.style.opacity='0';
      cl.classList.add('open');cr.classList.add('open');
      app.classList.add('reveal');
      setTimeout(()=>{splash.style.display='none';cl.style.display='none';cr.style.display='none'},1000);
    },300);
  }
  window._dismissSplash=dismissSplash;
  // Fallback: auto dismiss after 4s
  setTimeout(dismissSplash,4000);
})();
</script>
